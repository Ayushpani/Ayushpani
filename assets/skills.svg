<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 290" width="100%" height="100%">
  <defs>
    <!-- Import Google Font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap');
      
      .bg {
        fill: #0B0F19;
      }
      
      .shelf-title {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 11px;
        fill: #4F46E5;
        letter-spacing: 1.5px;
        text-anchor: middle;
      }

      .shelf-title.devops { fill: #0D9488; }
      .shelf-title.languages { fill: #2563EB; }
      
      .card-rect {
        fill: #161B26;
        stroke: #2E3A52;
        stroke-width: 1;
        rx: 6px;
        transition: stroke 0.3s, fill 0.3s;
      }
      
      .card-text {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 700;
        font-size: 11.5px;
        fill: #F8FAFC;
      }
      
      .card-subtext {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 500;
        font-size: 8.5px;
        fill: #94A3B8;
      }

      .icon-path {
        fill: #94A3B8;
      }

      /* Animation definitions */
      .fade-col-1 {
        opacity: 0;
        transform: translateY(10px);
        animation: cardFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.1s;
      }
      .fade-col-2 {
        opacity: 0;
        transform: translateY(10px);
        animation: cardFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.3s;
      }
      .fade-col-3 {
        opacity: 0;
        transform: translateY(10px);
        animation: cardFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.5s;
      }

      @keyframes cardFade {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-group:hover .card-rect {
        stroke: #3B82F6;
        fill: #1E293B;
      }

      .card-group:hover .icon-path {
        fill: #38BDF8;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="290" class="bg" />

  <!-- COLUMN 1: AI, MLOps & Data -->
  <g class="fade-col-1">
    <text x="152" y="30" class="shelf-title">AI, MLOPS &amp; DATA PLATFORM</text>
    
    <!-- Row 1: Agentic AI & MCP -->
    <g class="card-group" transform="translate(36, 50)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Swarm nodes icon -->
      <circle cx="22" cy="23" r="3" class="icon-path" />
      <circle cx="15" cy="30" r="2" class="icon-path" />
      <circle cx="29" cy="30" r="2" class="icon-path" />
      <circle cx="22" cy="14" r="2" class="icon-path" />
      <line x1="22" y1="23" x2="15" y2="30" stroke="#94A3B8" stroke-width="1" />
      <line x1="22" y1="23" x2="29" y2="30" stroke="#94A3B8" stroke-width="1" />
      <line x1="22" y1="23" x2="22" y2="14" stroke="#94A3B8" stroke-width="1" />
      <text x="44" y="21" class="card-text">Agentic AI &amp; MCP</text>
      <text x="44" y="33" class="card-subtext">LangChain, Swarm, Model Context Protocol</text>
    </g>

    <!-- Row 2: LLM Orchestrator -->
    <g class="card-group" transform="translate(36, 106)">
      <rect width="232" height="46" class="card-rect" />
      <!-- AI model/neuron representation -->
      <path class="icon-path" d="M 16,23 L 28,15 L 28,31 Z" />
      <text x="44" y="21" class="card-text">LLM Orchestration</text>
      <text x="44" y="33" class="card-subtext">LLaMA, Qwen, Fine-tuning, LoRA/SFT</text>
    </g>

    <!-- Row 3: MLOps Pipelines -->
    <g class="card-group" transform="translate(36, 162)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Airflow gears representation -->
      <circle cx="22" cy="23" r="7" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="22" y1="13" x2="22" y2="33" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="12" y1="23" x2="32" y2="23" stroke="#94A3B8" stroke-width="1.5" />
      <text x="44" y="21" class="card-text">MLOps Pipelines</text>
      <text x="44" y="33" class="card-subtext">Apache Airflow, NiFi, Kubeflow</text>
    </g>

    <!-- Row 4: Vector Retrieval & RAG -->
    <g class="card-group" transform="translate(36, 218)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Database cylinders with search glass -->
      <circle cx="22" cy="20" r="5" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="26" y1="24" x2="31" y2="29" stroke="#94A3B8" stroke-width="2" />
      <text x="44" y="21" class="card-text">Vector Retrieval &amp; RAG</text>
      <text x="44" y="33" class="card-subtext">Qdrant, ChromaDB, LlamaIndex</text>
    </g>
  </g>

  <!-- COLUMN 2: DevOps, Security & Auth -->
  <g class="fade-col-2">
    <text x="400" y="30" class="shelf-title devops">DEVOPS, SEC &amp; AUTH</text>
    
    <!-- Row 1: Kubernetes -->
    <g class="card-group" transform="translate(284, 50)">
      <rect width="232" height="46" class="card-rect" />
      <!-- K8s wheel shape -->
      <path class="icon-path" d="M 22,15 L 28,17 L 31,23 L 28,29 L 22,31 L 16,29 L 13,23 L 16,17 Z" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="22" y1="15" x2="22" y2="31" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="13" y1="23" x2="31" y2="23" stroke="#94A3B8" stroke-width="1.5" />
      <text x="44" y="21" class="card-text">Kubernetes Orchestration</text>
      <text x="44" y="33" class="card-subtext">Helm, HPA, K8s Operators, Docker</text>
    </g>

    <!-- Row 2: API Gateway -->
    <g class="card-group" transform="translate(284, 106)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Funnel gateway -->
      <path class="icon-path" d="M 14,16 L 30,16 L 24,24 L 24,30 L 20,30 L 20,24 Z" />
      <text x="44" y="21" class="card-text">API Gateways</text>
      <text x="44" y="33" class="card-subtext">APISIX, Kong, Ingress, Cert-manager</text>
    </g>

    <!-- Row 3: Identity & AuthZ -->
    <g class="card-group" transform="translate(284, 162)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Lock icon -->
      <path class="icon-path" d="M 19,20 L 19,16 C 19,13 25,13 25,16 L 25,20 M 16,20 L 28,20 L 28,30 L 16,30 Z" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <text x="44" y="21" class="card-text">Identity &amp; AuthZ</text>
      <text x="44" y="33" class="card-subtext">Keycloak, OpenFGA, RBAC, OAuth2</text>
    </g>

    <!-- Row 4: Platform Security -->
    <g class="card-group" transform="translate(284, 218)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Key representation -->
      <circle cx="18" cy="23" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="22" y1="23" x2="30" y2="23" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="26" y1="23" x2="26" y2="27" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="29" y1="23" x2="29" y2="27" stroke="#94A3B8" stroke-width="1.5" />
      <text x="44" y="21" class="card-text">Platform Security</text>
      <text x="44" y="33" class="card-subtext">API Key Infrastructure, SSL/TLS, Certs</text>
    </g>
  </g>

  <!-- COLUMN 3: Languages & Databases -->
  <g class="fade-col-3">
    <text x="648" y="30" class="shelf-title languages">LANGUAGES &amp; DATA</text>
    
    <!-- Row 1: Languages -->
    <g class="card-group" transform="translate(532, 50)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Code bracket icon -->
      <path class="icon-path" d="M 18,18 L 13,23 L 18,28 M 26,18 L 31,23 L 26,28" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <text x="44" y="21" class="card-text">Development Languages</text>
      <text x="44" y="33" class="card-subtext">Python, Go, SQL, Shell Scripting, YAML</text>
    </g>

    <!-- Row 2: Databases -->
    <g class="card-group" transform="translate(532, 106)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Cylinders icon -->
      <path class="icon-path" d="M 16,18 C 16,16 28,16 28,18 L 28,21 C 28,23 16,23 16,21 Z M 16,21 C 16,23 28,23 28,21 L 28,25 C 28,27 16,27 16,25 Z M 16,25 C 16,27 28,27 28,25 L 28,29 C 28,31 16,31 16,29 Z" fill="none" stroke="#94A3B8" stroke-width="1" />
      <text x="44" y="21" class="card-text">Databases</text>
      <text x="44" y="33" class="card-subtext">PostgreSQL, MongoDB, ArangoDB, Redis</text>
    </g>

    <!-- Row 3: Data Aggregators -->
    <g class="card-group" transform="translate(532, 162)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Flow arrows representation -->
      <path class="icon-path" d="M 14,20 L 22,20 L 22,15 L 30,23 L 22,31 L 22,26 L 14,26 Z" />
      <text x="44" y="21" class="card-text">Data Aggregators</text>
      <text x="44" y="33" class="card-subtext">Kafka, CDC, Airbyte, ETL/ELT pipelines</text>
    </g>

    <!-- Row 4: Interfaces & UI -->
    <g class="card-group" transform="translate(532, 218)">
      <rect width="232" height="46" class="card-rect" />
      <!-- Web layout icon -->
      <rect x="15" y="17" width="14" height="12" fill="none" stroke="#94A3B8" stroke-width="1.5" rx="2" />
      <line x1="15" y1="21" x2="29" y2="21" stroke="#94A3B8" stroke-width="1.5" />
      <text x="44" y="21" class="card-text">Interfaces &amp; UI</text>
      <text x="44" y="33" class="card-subtext">REST APIs, React, Node.js</text>
    </g>
  </g>
</svg>
