<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Import Google Font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap');
      
      .bg {
        fill: #0B0F19;
      }
      
      .shelf-title {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 11px;
        fill: #4F46E5;
        letter-spacing: 1.5px;
        text-anchor: middle;
      }

      .shelf-title.backend { fill: #0D9488; }
      .shelf-title.devops { fill: #2563EB; }
      
      .card-rect {
        fill: #161B26;
        stroke: #2E3A52;
        stroke-width: 1;
        rx: 6px;
        transition: stroke 0.3s, fill 0.3s;
      }
      
      .card-text {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 600;
        font-size: 12px;
        fill: #F8FAFC;
      }
      
      .card-subtext {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 400;
        font-size: 9px;
        fill: #94A3B8;
      }

      .icon-path {
        fill: #94A3B8;
      }

      /* Animation definitions */
      .fade-col-1 {
        opacity: 0;
        animation: cardFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.1s;
      }
      .fade-col-2 {
        opacity: 0;
        animation: cardFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.3s;
      }
      .fade-col-3 {
        opacity: 0;
        animation: cardFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.5s;
      }

      @keyframes cardFade {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-group:hover .card-rect {
        stroke: #3B82F6;
        fill: #1E293B;
      }

      .card-group:hover .icon-path {
        fill: #38BDF8;
      }

      .card-group {
        cursor: pointer;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" class="bg" />

  <!-- COLUMN 1: Languages & Frontend -->
  <g class="fade-col-1">
    <text x="130" y="30" class="shelf-title">LANGUAGES &amp; FRONTEND</text>
    
    <!-- JS & TS -->
    <g class="card-group" transform="translate(40, 50)">
      <rect width="180" height="45" class="card-rect" />
      <!-- JS logo -->
      <path class="icon-path" d="M 20,15 L 35,15 L 35,30 L 20,30 Z" fill="#94A3B8" opacity="0.3" />
      <text x="23" y="27" font-family="'Plus Jakarta Sans'" font-weight="800" font-size="10" fill="#F8FAFC">JS</text>
      <text x="48" y="22" class="card-text">JavaScript &amp; TS</text>
      <text x="48" y="34" class="card-subtext">Modern ES6+, Next.js, React</text>
    </g>

    <!-- HTML & CSS -->
    <g class="card-group" transform="translate(40, 110)">
      <rect width="180" height="45" class="card-rect" />
      <!-- Shield / Layout logo -->
      <path class="icon-path" d="M 27,14 L 35,17 L 33,28 L 27,31 L 21,28 L 19,17 Z" />
      <text x="48" y="22" class="card-text">HTML5 &amp; CSS3</text>
      <text x="48" y="34" class="card-subtext">Responsive, Flexbox, Grid</text>
    </g>

    <!-- Shell Scripting -->
    <g class="card-group" transform="translate(40, 170)">
      <rect width="180" height="45" class="card-rect" />
      <!-- Terminal logo -->
      <path class="icon-path" d="M 20,18 L 26,22 L 20,26 M 28,26 L 34,26" stroke="#94A3B8" stroke-width="2" fill="none" />
      <text x="48" y="22" class="card-text">Shell Scripting</text>
      <text x="48" y="34" class="card-subtext">Bash &amp; PowerShell utilities</text>
    </g>
  </g>

  <!-- COLUMN 2: Backend & Logic -->
  <g class="fade-col-2">
    <text x="400" y="30" class="shelf-title backend">BACKEND &amp; DATABASES</text>
    
    <!-- Python & FastAPI -->
    <g class="card-group" transform="translate(310, 50)">
      <rect width="180" height="45" class="card-rect" />
      <!-- Python snakes representation -->
      <path class="icon-path" d="M 23,15 C 20,15 20,18 20,20 L 20,22 L 23,22 L 23,23 L 26,23 L 26,20 C 26,18 28,18 30,18 L 32,18 L 32,15 Z M 31,30 C 34,30 34,27 34,25 L 34,23 L 31,23 L 31,22 L 28,22 L 28,25 C 28,27 26,27 24,27 L 22,27 L 22,30 Z" />
      <text x="48" y="22" class="card-text">Python &amp; FastAPI</text>
      <text x="48" y="34" class="card-subtext">REST APIs, Async programming</text>
    </g>

    <!-- Database PostgreSQL -->
    <g class="card-group" transform="translate(310, 110)">
      <rect width="180" height="45" class="card-rect" />
      <!-- Database cylinder -->
      <path class="icon-path" d="M 20,17 C 20,15 34,15 34,17 L 34,22 C 34,24 20,24 20,22 Z M 20,22 C 20,24 34,24 34,22 L 34,27 C 34,29 20,29 20,27 Z M 20,27 C 20,29 34,29 34,27 L 34,32 C 34,34 20,34 20,32 Z" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <text x="48" y="22" class="card-text">PostgreSQL &amp; SQL</text>
      <text x="48" y="34" class="card-subtext">SQLAlchemy, Alembic migrations</text>
    </g>

    <!-- Keycloak Security -->
    <g class="card-group" transform="translate(310, 170)">
      <rect width="180" height="45" class="card-rect" />
      <!-- Lock / Key icon -->
      <path class="icon-path" d="M 23,21 L 23,18 C 23,15 27,15 27,18 L 27,21 M 20,21 L 34,21 L 34,31 L 20,31 Z" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <text x="48" y="22" class="card-text">Keycloak &amp; Security</text>
      <text x="48" y="34" class="card-subtext">OAuth2, OIDC, Authentication</text>
    </g>
  </g>

  <!-- COLUMN 3: DevOps & Tools -->
  <g class="fade-col-3">
    <text x="670" y="30" class="shelf-title devops">DEVOPS &amp; CONTAINERS</text>
    
    <!-- Docker -->
    <g class="card-group" transform="translate(580, 50)">
      <rect width="180" height="45" class="card-rect" />
      <!-- Container blocks -->
      <rect x="22" y="15" width="4" height="4" class="icon-path" />
      <rect x="27" y="15" width="4" height="4" class="icon-path" />
      <rect x="32" y="15" width="4" height="4" class="icon-path" />
      <rect x="24" y="20" width="4" height="4" class="icon-path" />
      <rect x="29" y="20" width="4" height="4" class="icon-path" />
      <path class="icon-path" d="M 18,26 C 18,29 25,29 27,29 C 32,29 35,27 36,25 L 16,25 Z" />
      <text x="48" y="22" class="card-text">Docker &amp; Containers</text>
      <text x="48" y="34" class="card-subtext">Containerization &amp; Multi-stage builds</text>
    </g>

    <!-- Kubernetes -->
    <g class="card-group" transform="translate(580, 110)">
      <rect width="180" height="45" class="card-rect" />
      <!-- K8s wheel shape -->
      <path class="icon-path" d="M 27,13 L 34,16 L 37,23 L 34,30 L 27,33 L 20,30 L 17,23 L 20,16 Z" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="27" y1="13" x2="27" y2="33" stroke="#94A3B8" stroke-width="1.5" />
      <line x1="17" y1="23" x2="37" y2="23" stroke="#94A3B8" stroke-width="1.5" />
      <text x="48" y="22" class="card-text">Kubernetes</text>
      <text x="48" y="34" class="card-subtext">Orchestration, Deployments, Pods</text>
    </g>

    <!-- Git & CI/CD -->
    <g class="card-group" transform="translate(580, 170)">
      <rect width="180" height="45" class="card-rect" />
      <!-- Git branch node representation -->
      <circle cx="23" cy="28" r="3" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <circle cx="23" cy="18" r="3" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <circle cx="32" cy="18" r="3" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <path d="M 23,25 L 23,21" stroke="#94A3B8" stroke-width="1.5" />
      <path d="M 23,25 C 23,22 32,22 32,21" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <text x="48" y="22" class="card-text">Git &amp; GitHub Actions</text>
      <text x="48" y="34" class="card-subtext">Version control &amp; pipelines</text>
    </g>
  </g>
</svg>
