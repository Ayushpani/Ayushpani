<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- Import Google Font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&amp;display=swap');
      
      .bg {
        fill: #080C14;
      }
      
      .title {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 44px;
        fill: #FFFFFF;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.2s;
      }
      
      .subtitle {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 600;
        font-size: 14px;
        fill: #E28743; /* Holy Saffron */
        letter-spacing: 3px;
        opacity: 0;
        transform: translateY(15px);
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.6s;
      }

      .status-tag {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        font-weight: 600;
        font-size: 11px;
        fill: #D4AF37; /* Sacred Gold */
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeIn 1.5s ease forwards;
        animation-delay: 1s;
      }

      .status-dot {
        fill: #E28743;
        opacity: 0;
        animation: blink 2s infinite, fadeIn 1.5s ease forwards;
        animation-delay: 1s;
      }
      
      .grid-line {
        stroke: #2A2E3D;
        stroke-width: 0.5;
        opacity: 0.12;
      }
      
      /* Vedic Mandala / Yantra Styles */
      .yantra-line {
        stroke: #D4AF37;
        stroke-width: 0.8;
        stroke-opacity: 0.22;
        fill: none;
      }
      
      .yantra-pulse {
        animation: pulseOpacity 6s ease-in-out infinite;
      }

      .emblem-path {
        fill: none;
        stroke: #D4AF37;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.8;
      }

      .emblem-bindu {
        fill: #E28743;
        stroke: none;
      }
      
      .yantra-group {
        transform-origin: 660px 175px;
        animation: rotateCW 50s linear infinite;
      }
      
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }

      @keyframes pulseOpacity {
        0%, 100% { stroke-opacity: 0.15; }
        50% { stroke-opacity: 0.35; }
      }

      @keyframes rotateCW {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" class="bg" />

  <!-- Grid Backdrop -->
  <g>
    <line x1="100" y1="0" x2="100" y2="350" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="350" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="350" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="350" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="350" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="350" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="350" class="grid-line" />
    
    <line x1="0" y1="70" x2="800" y2="70" class="grid-line" />
    <line x1="0" y1="140" x2="800" y2="140" class="grid-line" />
    <line x1="0" y1="210" x2="800" y2="210" class="grid-line" />
    <line x1="0" y1="280" x2="800" y2="280" class="grid-line" />
  </g>

  <!-- Rotating Sacred Geometry Yantra (Right Side) -->
  <g class="yantra-group">
    <!-- Bhupura (Outer Square Walls of Yantra) -->
    <rect x="560" y="75" width="200" height="200" class="yantra-line" />
    <rect x="560" y="75" width="200" height="200" class="yantra-line" transform="rotate(45 660 175)" />
    
    <!-- Concentric Circles -->
    <circle cx="660" cy="175" r="95" class="yantra-line" />
    <circle cx="660" cy="175" r="75" class="yantra-line" />
    <circle cx="660" cy="175" r="55" class="yantra-line" />
    <circle cx="660" cy="175" r="35" class="yantra-line" />
    
    <!-- Interlocking Triangles (Sri Yantra Representation) -->
    <!-- Upward Triangles -->
    <polygon points="660,95 615,190 705,190" class="yantra-line yantra-pulse" />
    <polygon points="660,125 595,215 725,215" class="yantra-line" />
    <polygon points="660,145 630,235 690,235" class="yantra-line yantra-pulse" />
    
    <!-- Downward Triangles -->
    <polygon points="660,255 615,160 705,160" class="yantra-line" />
    <polygon points="660,225 595,135 725,135" class="yantra-line yantra-pulse" />
    <polygon points="660,205 630,115 690,115" class="yantra-line" />
    
    <!-- Central Bindu (Dot) -->
    <circle cx="660" cy="175" r="2.5" fill="#D4AF37" />
  </g>

  <!-- Saffron & Gold Minimalist Shiva Emblem (Top Left) -->
  <g transform="translate(60, 95)">
    <!-- Tripundra (Three Horizontal Ash Lines) -->
    <line x1="0" y1="0" x2="50" y2="0" stroke="#94A3B8" stroke-width="2" opacity="0.6" stroke-linecap="round" />
    <line x1="0" y1="5" x2="50" y2="5" stroke="#94A3B8" stroke-width="2" opacity="0.6" stroke-linecap="round" />
    <line x1="0" y1="10" x2="50" y2="10" stroke="#94A3B8" stroke-width="2" opacity="0.6" stroke-linecap="round" />
    <!-- Saffron Bindu (Third Eye Dot) -->
    <ellipse cx="25" cy="5" rx="3.5" ry="5.5" class="emblem-bindu" />

    <!-- Trishula & Damru (Minimalist Gold Vector) -->
    <g transform="translate(75, -20)">
      <!-- Trishula (Trident) -->
      <!-- Center Prong -->
      <line x1="15" y1="5" x2="15" y2="40" class="emblem-path" />
      <path d="M 15,5 L 15,0" class="emblem-path" />
      <!-- Side Prongs -->
      <path d="M 5,12 C 5,28 25,28 25,12" class="emblem-path" />
      <path d="M 5,12 L 5,8" class="emblem-path" />
      <path d="M 25,12 L 25,8" class="emblem-path" />
      
      <!-- Damru (Drum) at the center shaft -->
      <polygon points="10,26 20,26 12,32 18,32" fill="none" stroke="#D4AF37" stroke-width="1.2" />
      <!-- Small Hanging Beads -->
      <line x1="15" y1="29" x2="8" y2="35" stroke="#D4AF37" stroke-width="0.8" />
      <circle cx="8" cy="35" r="1.5" fill="#D4AF37" />
    </g>
  </g>

  <!-- Status Bar -->
  <g transform="translate(60, 45)">
    <circle cx="0" cy="-4" r="3" class="status-dot" />
    <text x="12" y="0" class="status-tag">SYSTEM STATUS: ACTIVE | MLOPS PIPELINE: ONLINE</text>
  </g>

  <!-- Typography -->
  <g transform="translate(60, 195)">
    <text x="0" y="0" class="title">Ayush Panigrahi</text>
    <text x="0" y="38" class="subtitle">AI PLATFORM &amp; MLOPS ENGINEER | SYSTEMS ARCHITECT</text>
  </g>

  <!-- Accent Line -->
  <line x1="60" y1="270" x2="450" y2="270" stroke="#E28743" stroke-width="1.5" opacity="0.3" />
</svg>
