<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- Import Google Font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&amp;display=swap');
      
      .bg {
        fill: #0B0F19;
      }
      
      .title {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 44px;
        fill: #FFFFFF;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.2s;
      }
      
      .subtitle {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 500;
        font-size: 15px;
        fill: #94A3B8;
        letter-spacing: 3px;
        opacity: 0;
        transform: translateY(15px);
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.6s;
      }

      .status-tag {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        font-weight: 600;
        font-size: 11px;
        fill: #0D9488;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeIn 1.5s ease forwards;
        animation-delay: 1s;
      }

      .status-dot {
        fill: #0D9488;
        opacity: 0;
        animation: blink 2s infinite, fadeIn 1.5s ease forwards;
        animation-delay: 1s;
      }
      
      .grid-line {
        stroke: #1E293B;
        stroke-width: 0.5;
        opacity: 0.15;
      }
      
      /* Constellation styles */
      .constellation-node {
        fill: #3B82F6;
        transition: fill 0.3s;
        animation: nodePulse 4s ease-in-out infinite;
      }

      .constellation-node.sec {
        fill: #0D9488;
      }
      
      .constellation-edge {
        stroke: #1E293B;
        stroke-width: 1;
        stroke-opacity: 0.4;
      }
      
      .network-group-1 {
        transform-origin: 650px 175px;
        animation: rotateCW 35s linear infinite;
      }
      
      .network-group-2 {
        transform-origin: 670px 160px;
        animation: rotateCCW 55s linear infinite;
      }
      
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }

      @keyframes nodePulse {
        0%, 100% { r: 3.5px; opacity: 0.7; }
        50% { r: 5px; opacity: 1; }
      }

      @keyframes rotateCW {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes rotateCCW {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" class="bg" />

  <!-- Grid Backdrop -->
  <g>
    <line x1="100" y1="0" x2="100" y2="350" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="350" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="350" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="350" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="350" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="350" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="350" class="grid-line" />
    
    <line x1="0" y1="70" x2="800" y2="70" class="grid-line" />
    <line x1="0" y1="140" x2="800" y2="140" class="grid-line" />
    <line x1="0" y1="210" x2="800" y2="210" class="grid-line" />
    <line x1="0" y1="280" x2="800" y2="280" class="grid-line" />
  </g>

  <!-- Constellation Network (Top Right / Center-Right Background) -->
  <!-- Network Group 1 (Clockwise Rotation) -->
  <g class="network-group-1">
    <!-- Lines (Edges) -->
    <line x1="600" y1="100" x2="680" y2="120" class="constellation-edge" />
    <line x1="680" y1="120" x2="720" y2="200" class="constellation-edge" />
    <line x1="720" y1="200" x2="650" y2="250" class="constellation-edge" />
    <line x1="650" y1="250" x2="570" y2="200" class="constellation-edge" />
    <line x1="570" y1="200" x2="600" y2="100" class="constellation-edge" />
    <line x1="600" y1="100" x2="650" y2="175" class="constellation-edge" />
    <line x1="680" y1="120" x2="650" y2="175" class="constellation-edge" />
    <line x1="720" y1="200" x2="650" y2="175" class="constellation-edge" />
    <line x1="650" y1="250" x2="650" y2="175" class="constellation-edge" />
    <line x1="570" y1="200" x2="650" y2="175" class="constellation-edge" />

    <!-- Vertices (Nodes) -->
    <circle cx="600" cy="100" r="4" class="constellation-node" style="animation-delay: 0.1s;" />
    <circle cx="680" cy="120" r="4" class="constellation-node" style="animation-delay: 0.5s;" />
    <circle cx="720" cy="200" r="4" class="constellation-node" style="animation-delay: 1.2s;" />
    <circle cx="650" cy="250" r="4" class="constellation-node" style="animation-delay: 0.8s;" />
    <circle cx="570" cy="200" r="4" class="constellation-node" style="animation-delay: 1.9s;" />
    <circle cx="650" cy="175" r="4" class="constellation-node" style="animation-delay: 0.3s;" />
  </g>

  <!-- Network Group 2 (Counter-Clockwise Rotation & Parallax) -->
  <g class="network-group-2">
    <!-- Lines (Edges) -->
    <line x1="550" y1="120" x2="670" y2="60" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="670" y1="60" x2="750" y2="130" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="750" y1="130" x2="710" y2="240" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="710" y1="240" x2="590" y2="260" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="590" y1="260" x2="550" y2="120" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="670" y1="160" x2="550" y2="120" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="670" y1="160" x2="670" y2="60" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="670" y1="160" x2="750" y2="130" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="670" y1="160" x2="710" y2="240" class="constellation-edge" style="stroke-opacity: 0.2;" />
    <line x1="670" y1="160" x2="590" y2="260" class="constellation-edge" style="stroke-opacity: 0.2;" />

    <!-- Vertices (Nodes) -->
    <circle cx="550" cy="120" r="3" class="constellation-node sec" style="animation-delay: 0.4s;" />
    <circle cx="670" cy="60" r="3" class="constellation-node sec" style="animation-delay: 1.1s;" />
    <circle cx="750" cy="130" r="3" class="constellation-node sec" style="animation-delay: 0.2s;" />
    <circle cx="710" cy="240" r="3" class="constellation-node sec" style="animation-delay: 1.5s;" />
    <circle cx="590" cy="260" r="3" class="constellation-node sec" style="animation-delay: 0.7s;" />
    <circle cx="670" cy="160" r="3" class="constellation-node sec" style="animation-delay: 1.3s;" />
  </g>

  <!-- Status Bar -->
  <g transform="translate(60, 45)">
    <circle cx="0" cy="-4" r="3" class="status-dot" />
    <text x="12" y="0" class="status-tag">SYSTEM STATUS: ACTIVE | MLOPS PIPELINE: ONLINE</text>
  </g>

  <!-- Typography -->
  <g transform="translate(60, 160)">
    <text x="0" y="0" class="title">Ayush Panigrahi</text>
    <text x="0" y="38" class="subtitle">AI PLATFORM &amp; MLOPS ENGINEER | SYSTEMS ARCHITECT</text>
  </g>

  <!-- Decorative Minimalist Border (Bottom-left graphic Accent) -->
  <line x1="60" y1="240" x2="400" y2="240" stroke="#2E3A52" stroke-width="1.5" opacity="0.4" />
</svg>
