<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- Import Google Font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&amp;display=swap');
      
      .bg {
        fill: #0B0F19;
      }
      
      .title {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 46px;
        fill: #FFFFFF;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.2s;
      }
      
      .subtitle {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 400;
        font-size: 18px;
        fill: #94A3B8;
        letter-spacing: 2px;
        opacity: 0;
        transform: translateY(15px);
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.6s;
      }

      .status-tag {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        font-weight: 600;
        font-size: 11px;
        fill: #0D9488;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeIn 1.5s ease forwards;
        animation-delay: 1s;
      }

      .status-dot {
        fill: #0D9488;
        opacity: 0;
        animation: blink 2s infinite, fadeIn 1.5s ease forwards;
        animation-delay: 1s;
      }
      
      .grid-line {
        stroke: #1E293B;
        stroke-width: 0.5;
        opacity: 0.15;
      }
      
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
    </style>

    <!-- Gradients for Waves -->
    <linearGradient id="wave1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="wave2-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.05" />
    </linearGradient>

    <linearGradient id="wave3-grad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" class="bg" />

  <!-- Architectural Grid Backdrop -->
  <g>
    <!-- Vertical Lines -->
    <line x1="100" y1="0" x2="100" y2="350" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="350" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="350" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="350" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="350" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="350" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="350" class="grid-line" />
    
    <!-- Horizontal Lines -->
    <line x1="0" y1="70" x2="800" y2="70" class="grid-line" />
    <line x1="0" y1="140" x2="800" y2="140" class="grid-line" />
    <line x1="0" y1="210" x2="800" y2="210" class="grid-line" />
    <line x1="0" y1="280" x2="800" y2="280" class="grid-line" />
  </g>

  <!-- Morphing Waves Group -->
  <!-- Wave 1 (Deep Blue/Indigo) -->
  <path fill="url(#wave1-grad)">
    <animate 
      attributeName="d" 
      dur="15s" 
      repeatCount="indefinite"
      values="
        M 0,350 L 0,220 C 180,140 380,260 580,170 C 680,120 740,190 800,130 L 800,350 Z;
        M 0,350 L 0,180 C 220,110 420,290 620,140 C 710,70 750,170 800,100 L 800,350 Z;
        M 0,350 L 0,240 C 160,170 360,230 560,190 C 660,130 770,210 800,160 L 800,350 Z;
        M 0,350 L 0,220 C 180,140 380,260 580,170 C 680,120 740,190 800,130 L 800,350 Z
      " 
    />
  </path>

  <!-- Wave 2 (Teal/Blue) -->
  <path fill="url(#wave2-grad)">
    <animate 
      attributeName="d" 
      dur="20s" 
      repeatCount="indefinite"
      values="
        M 0,350 L 0,160 C 240,240 440,120 600,210 C 700,270 760,180 800,240 L 800,350 Z;
        M 0,350 L 0,200 C 200,150 400,200 580,160 C 680,120 740,240 800,190 L 800,350 Z;
        M 0,350 L 0,140 C 260,260 420,90 620,230 C 710,290 770,150 800,260 L 800,350 Z;
        M 0,350 L 0,160 C 240,240 440,120 600,210 C 700,270 760,180 800,240 L 800,350 Z
      " 
    />
  </path>

  <!-- Wave 3 (Soft Indigo Overlay) -->
  <path fill="url(#wave3-grad)">
    <animate 
      attributeName="d" 
      dur="25s" 
      repeatCount="indefinite"
      values="
        M 0,350 L 0,260 C 150,220 300,280 500,230 C 650,190 730,270 800,220 L 800,350 Z;
        M 0,350 L 0,280 C 170,250 320,240 480,260 C 620,280 720,230 800,250 L 800,350 Z;
        M 0,350 L 0,240 C 140,200 280,300 520,210 C 670,150 740,290 800,200 L 800,350 Z;
        M 0,350 L 0,260 C 150,220 300,280 500,230 C 650,190 730,270 800,220 L 800,350 Z
      " 
    />
  </path>

  <!-- Sleek Top Status Bar -->
  <g transform="translate(60, 45)">
    <circle cx="0" cy="-4" r="3" class="status-dot" />
    <text x="12" y="0" class="status-tag">SYSTEM STATUS: FULLY OPERATIONAL</text>
  </g>

  <!-- Typography -->
  <g transform="translate(60, 150)">
    <text x="0" y="0" class="title">Ayush Pani</text>
    <text x="0" y="38" class="subtitle">SOFTWARE ENGINEER &amp; ARCHITECT</text>
  </g>

  <!-- Elegant Decorative Element (Minimalist Coordinate HUD) -->
  <g transform="translate(740, 45)" opacity="0.4">
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#94A3B8" stroke-width="1" />
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#94A3B8" stroke-width="1" />
    <circle cx="0" cy="0" r="8" stroke="#94A3B8" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  </g>
</svg>
